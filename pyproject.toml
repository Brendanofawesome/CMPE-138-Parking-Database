[tool.pytest.ini_options]
minversion = "6.0"
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-v --maxfail=1 --strict-markers --cov=src --cov-report=term-missing --cov-fail-under=80"
markers = [
    "slow: marks slow tests",
    "integration: marks integration tests",
]
norecursedirs = [".git", "venv", "build", "dist"]

[tool.coverage.run]
omit = ["src/db_init.py", "src/serve_debug.py", "src/serve_wsgi.py"]

[tool.pylint.main]
jobs = 0

[tool.pylint.messages_control]
disable = [
    "C0114", # missing-module-docstring
    "C0115", # missing-class-docstring
    "C0116", # missing-function-docstring
    "C0303", # its a bit too strict
    "R0801", # fails on like 3 duplicated lines ????
    "R0913", # we're too young to worry about this
]

[tool.pylint.format]
max-line-length = 150

[tool.pylint.basic]
argument-naming-style = "snake_case"
attr-naming-style = "snake_case"
function-naming-style = "snake_case"
method-naming-style = "snake_case"
module-naming-style = "snake_case"
variable-naming-style = "snake_case"
class-naming-style = "PascalCase"
const-naming-style = "UPPER_CASE"
class-const-naming-style = "UPPER_CASE"
good-names = ["i", "j", "k", "ex", "_"]

[tool.pylint.reports]
score = true
fail-under = "9.0"

[tool.mypy]
python_version = "3.10"
mypy_path = "src"
warn_unused_configs = true
warn_return_any = true
ignore_missing_imports = true
disallow_untyped_defs = true
check_untyped_defs = true
files = ["src"]